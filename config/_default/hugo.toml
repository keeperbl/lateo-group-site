baseURL = "https://keeperbl.github.io/lateo-group-site/"
defaultContentLanguage = "ru"
title = "Группа компаний Латео"
theme = "congo"
enableRobotsTXT = true
summaryLength = 0
canonifyURLs = true

[pagination]
  pagerSize = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.goldmark]
    [markup.goldmark.renderer]
      unsafe = true
  [markup.highlight]
    style = "github"
